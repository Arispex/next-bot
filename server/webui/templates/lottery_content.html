<section class="lottery-layout">

  <div class="lottery-toolbar">
    <div class="lottery-toolbar-spacer"></div>
    <div class="panel-head-actions">
      <button id="lottery-reload-btn" type="button" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
        刷新
      </button>
      <button id="pool-create-btn" type="button" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
        新建奖池
      </button>
    </div>
  </div>

  <div id="lottery-alert" class="alert hidden" role="status" aria-live="polite">
    <span id="lottery-alert-message" class="alert-message"></span>
  </div>

  <div class="lottery-master-detail">

    <aside class="lottery-list-panel">
      <div class="lottery-list-panel-head">奖池列表</div>
      <div id="pool-list" class="lottery-list"></div>
      <div id="lottery-list-empty" class="empty hidden">
        暂无奖池，点击右上角「新建奖池」
      </div>
    </aside>

    <section class="lottery-detail-panel">
      <div id="pool-detail-head" class="lottery-detail-head hidden">
        <div style="min-width:0; flex:1 1 auto;">
          <h3 id="pool-detail-title" class="lottery-detail-title"></h3>
          <div id="pool-detail-subtitle" class="lottery-detail-subtitle"></div>
          <div id="pool-detail-desc" class="lottery-detail-desc"></div>
        </div>
        <button id="prize-create-btn" type="button" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          新建奖品
        </button>
      </div>

      <div id="lottery-prize-table-wrap" class="table-wrap hidden">
        <table class="lottery-prize-table" aria-label="奖池奖品表格">
          <thead>
            <tr>
              <th class="col-index">#</th>
              <th class="col-kind">类型</th>
              <th>名称</th>
              <th class="col-price">概率</th>
              <th>详情</th>
              <th class="col-status">状态</th>
              <th class="col-actions">操作</th>
            </tr>
          </thead>
          <tbody id="prize-tbody"></tbody>
        </table>
      </div>

      <div id="lottery-prize-empty" class="empty hidden">该奖池暂无奖品，点击右上角「新建奖品」</div>
      <div id="lottery-detail-placeholder" class="empty">请在左侧选择一个奖池查看奖品</div>
    </section>

  </div>
</section>

<!-- Pool modal -->
<div id="pool-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="pool-modal-title">
  <div class="modal-mask" data-modal-close="pool-modal"></div>
  <div class="modal-card modal-card-narrow">
    <div class="modal-head">
      <h3 id="pool-modal-title" class="modal-title">编辑奖池</h3>
      <button type="button" class="btn btn-icon modal-close-btn" data-modal-close="pool-modal" aria-label="关闭">✕</button>
    </div>
    <div id="pool-modal-alert" class="alert hidden modal-alert" role="status" aria-live="polite">
      <span class="alert-message"></span>
    </div>
    <form id="pool-modal-form" class="modal-body">
      <div class="form-grid">
        <label class="form-item form-item-full">
          <span class="form-label">名称<span class="form-required">*</span></span>
          <input id="pool-field-name" class="input" type="text" maxlength="50" required />
        </label>
        <label class="form-item form-item-full">
          <span class="form-label">说明</span>
          <input id="pool-field-description" class="input" type="text" maxlength="200" placeholder="奖池简介，玩家会在「查看奖池」中看到" />
        </label>
        <label class="form-item">
          <span class="form-label">抽奖单价（金币 / 次）<span class="form-required">*</span></span>
          <input id="pool-field-cost" class="input" type="number" min="0" required value="0" />
        </label>
        <label class="form-item">
          <span class="form-label">排序（小靠前）</span>
          <input id="pool-field-sort-order" class="input" type="number" value="0" />
        </label>
        <label class="form-checkbox-row form-item form-item-bool form-item-full">
          <input id="pool-field-enabled" type="checkbox" checked />
          <span>上架（玩家可见）</span>
        </label>
      </div>
    </form>
    <div class="modal-foot">
      <button id="pool-modal-delete" type="button" class="btn btn-danger hidden">删除奖池</button>
      <div class="modal-foot-spacer"></div>
      <button type="button" class="btn" data-modal-close="pool-modal">取消</button>
      <button id="pool-modal-save" type="submit" form="pool-modal-form" class="btn btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- Prize modal -->
<div id="prize-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="prize-modal-title">
  <div class="modal-mask" data-modal-close="prize-modal"></div>
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="prize-modal-title" class="modal-title">编辑奖品</h3>
      <button type="button" class="btn btn-icon modal-close-btn" data-modal-close="prize-modal" aria-label="关闭">✕</button>
    </div>
    <div id="prize-modal-alert" class="alert hidden modal-alert" role="status" aria-live="polite">
      <span class="alert-message"></span>
    </div>
    <form id="prize-modal-form" class="modal-body">

      <div class="form-grid">
        <label class="form-item form-item-full">
          <span class="form-label">名称<span class="form-required">*</span></span>
          <input id="prize-field-name" class="input" type="text" maxlength="50" required />
        </label>
        <label class="form-item form-item-full">
          <span class="form-label">说明</span>
          <input id="prize-field-description" class="input" type="text" maxlength="200" placeholder="奖品简介，玩家会在「查看奖池」中看到" />
        </label>
        <label class="form-item">
          <span class="form-label">类型<span class="form-required">*</span></span>
          <select id="prize-field-kind" class="select">
            <option value="item">物品（送入仓库）</option>
            <option value="command">指令（立即执行）</option>
            <option value="coin">金币（增减玩家余额）</option>
          </select>
        </label>
        <label class="form-item">
          <span class="form-label">概率（0-100，留空则平分剩余）</span>
          <input id="prize-field-weight" class="input" type="number" min="0" max="100" step="0.1" placeholder="留空 = 自动平分剩余概率" />
        </label>
        <label class="form-item">
          <span class="form-label">排序（小靠前）</span>
          <input id="prize-field-sort-order" class="input" type="number" value="0" />
        </label>
        <label class="form-checkbox-row form-item form-item-bool">
          <input id="prize-field-enabled" type="checkbox" checked />
          <span>上架（玩家可中奖）</span>
        </label>
      </div>

      <div id="prize-kind-item-fields" class="field-section">
        <div class="field-section-title">物品配置</div>
        <div class="form-grid">
          <label class="form-item">
            <span class="form-label">物品 ID<span class="form-required">*</span></span>
            <input id="prize-field-item-id" class="input" type="number" min="1" value="1" />
          </label>
          <label class="form-item">
            <span class="form-label">前缀 ID</span>
            <input id="prize-field-prefix-id" class="input" type="number" min="0" value="0" />
          </label>
          <label class="form-item">
            <span class="form-label">单份数量</span>
            <input id="prize-field-quantity" class="input" type="number" min="1" value="1" />
          </label>
          <label class="form-item">
            <span class="form-label">进度要求</span>
            <select id="prize-field-min-tier" class="select"></select>
          </label>
          <label class="form-item">
            <span class="form-label">实际单价（选填，用于回收）</span>
            <input id="prize-field-actual-value" class="input" type="number" min="0" placeholder="留空 = 不可回收" />
          </label>
        </div>
        <div class="field-section-hint">中奖后自动写入玩家仓库的第一个空格（同一奖品多次中奖会合并到同一格）。</div>
        <label class="form-checkbox-row">
          <input id="prize-field-is-mystery" type="checkbox" />
          <span>盲盒模式（在「查看奖池」中隐藏物品图标 / 物品 ID / 前缀，仅显示奖品名称，默认关闭）</span>
        </label>
      </div>

      <div id="prize-kind-command-fields" class="field-section hidden">
        <div class="field-section-title">指令配置</div>
        <label class="form-item">
          <span class="form-label">目标服务器</span>
          <select id="prize-field-target-server" class="select">
            <option value="">全部服务器</option>
          </select>
        </label>
        <label class="form-item">
          <span class="form-label">命令模板<span class="form-required">*</span></span>
          <textarea id="prize-field-command-template" class="textarea textarea-mono" rows="3" maxlength="500" placeholder="/buff {player} 1 1800"></textarea>
        </label>
        <div class="field-section-hint">占位符 <code>{player}</code> 会替换为玩家游戏名；中奖会按抽中次数依次重复执行。</div>
        <label class="form-checkbox-row">
          <input id="prize-field-show-command" type="checkbox" />
          <span>在「查看奖池」中向玩家展示命令模板（默认隐藏）</span>
        </label>
        <label class="form-checkbox-row">
          <input id="prize-field-require-online" type="checkbox" />
          <span>要求玩家在线才能抽中（默认不要求）</span>
        </label>
      </div>

      <div id="prize-kind-coin-fields" class="field-section hidden">
        <div class="field-section-title">金币配置</div>
        <label class="form-item">
          <span class="form-label">金币数量<span class="form-required">*</span></span>
          <input id="prize-field-coin-amount" class="input" type="number" placeholder="正数 = 奖励，负数 = 扣除" />
        </label>
        <div class="field-section-hint">中奖后直接修改玩家余额（不入仓库、不发指令）。可填负数表示扣除。</div>
      </div>

    </form>
    <div class="modal-foot">
      <button id="prize-modal-delete" type="button" class="btn btn-danger hidden">删除奖品</button>
      <div class="modal-foot-spacer"></div>
      <button type="button" class="btn" data-modal-close="prize-modal">取消</button>
      <button id="prize-modal-save" type="submit" form="prize-modal-form" class="btn btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- Delete confirms -->
<div id="pool-delete-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-mask" data-modal-close="pool-delete-modal"></div>
  <div class="modal-card confirm-modal-card">
    <div class="modal-head">
      <h3 class="modal-title">删除奖池</h3>
      <button type="button" class="btn btn-icon modal-close-btn" data-modal-close="pool-delete-modal" aria-label="关闭">✕</button>
    </div>
    <div id="pool-delete-alert" class="alert hidden modal-alert"><span class="alert-message"></span></div>
    <div class="modal-body confirm-modal-body">
      <p class="confirm-modal-text">
        确定删除奖池「<span id="pool-delete-name" class="confirm-modal-highlight"></span>」吗？<br />
        该奖池下的所有奖品会一起被删除，此操作不可恢复。
      </p>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn" data-modal-close="pool-delete-modal">取消</button>
      <button id="pool-delete-confirm" type="button" class="btn btn-danger">确认删除</button>
    </div>
  </div>
</div>

<div id="prize-delete-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-mask" data-modal-close="prize-delete-modal"></div>
  <div class="modal-card confirm-modal-card">
    <div class="modal-head">
      <h3 class="modal-title">删除奖品</h3>
      <button type="button" class="btn btn-icon modal-close-btn" data-modal-close="prize-delete-modal" aria-label="关闭">✕</button>
    </div>
    <div id="prize-delete-alert" class="alert hidden modal-alert"><span class="alert-message"></span></div>
    <div class="modal-body confirm-modal-body">
      <p class="confirm-modal-text">
        确定删除奖品「<span id="prize-delete-name" class="confirm-modal-highlight"></span>」吗？此操作不可恢复。
      </p>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn" data-modal-close="prize-delete-modal">取消</button>
      <button id="prize-delete-confirm" type="button" class="btn btn-danger">确认删除</button>
    </div>
  </div>
</div>
