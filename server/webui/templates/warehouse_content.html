<section class="warehouse-layout">

  <div class="warehouse-toolbar">
    <div class="warehouse-toolbar-search">
      <div class="search-input-wrap">
        <span class="search-input-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
        </span>
        <input id="wh-search-input" class="input search-input" type="text" autocomplete="off"
               placeholder="搜索用户 QQ 号 / 用户名称…" />
        <div id="wh-search-dropdown" class="search-dropdown hidden"></div>
      </div>
    </div>
    <div class="panel-head-actions">
      <button id="wh-reload-btn" type="button" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
        刷新
      </button>
    </div>
  </div>

  <div id="wh-summary" class="warehouse-summary hidden">
    <div class="summary-chip">
      <span>用户：</span><strong id="wh-summary-name">—</strong>
    </div>
    <div class="summary-chip">
      <span>QQ：</span><strong id="wh-summary-qq">—</strong>
    </div>
    <div class="summary-chip">
      <span>已使用：</span><strong id="wh-summary-used">0</strong>
      <span> / </span><strong id="wh-summary-capacity">100</strong>
    </div>
  </div>

  <div id="wh-alert" class="alert hidden" role="status" aria-live="polite">
    <span id="wh-alert-message" class="alert-message"></span>
  </div>

  <div id="wh-grid-card" class="warehouse-grid-card hidden">
    <div id="wh-grid" class="wh-grid"></div>
  </div>

  <div id="wh-empty" class="empty">
    在上方输入用户 QQ 号或用户名称搜索，从下拉列表中选择用户开始管理。
  </div>
</section>

<div id="wh-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="wh-modal-title">
  <div class="modal-mask" data-modal-close="wh-modal"></div>
  <div class="modal-card modal-card-narrow">
    <div class="modal-head">
      <h3 id="wh-modal-title" class="modal-title">编辑物品</h3>
      <button type="button" class="btn btn-icon modal-close-btn" data-modal-close="wh-modal" aria-label="关闭">✕</button>
    </div>
    <div id="wh-modal-alert" class="alert hidden modal-alert" role="status" aria-live="polite">
      <span class="alert-message"></span>
    </div>
    <form id="wh-modal-form" class="modal-body">
      <div class="form-grid">
        <label class="form-item form-item-full">
          <span class="form-label">格子 ID</span>
          <input id="wh-field-slot" class="input" type="text" readonly />
        </label>
        <label class="form-item">
          <span class="form-label">物品 ID<span class="form-required">*</span></span>
          <input id="wh-field-item-id" class="input" type="number" min="1" required />
        </label>
        <label class="form-item">
          <span class="form-label">前缀 ID（0 = 无前缀）</span>
          <input id="wh-field-prefix-id" class="input" type="number" min="0" value="0" />
        </label>
        <label class="form-item">
          <span class="form-label">数量<span class="form-required">*</span></span>
          <input id="wh-field-quantity" class="input" type="number" min="1" value="1" required />
        </label>
        <label class="form-item">
          <span class="form-label">单价（金币 / 件，0 = 不可回收）</span>
          <input id="wh-field-value" class="input" type="number" min="0" value="0" />
        </label>
        <label class="form-item form-item-full">
          <span class="form-label">最低进度<span class="form-required">*</span></span>
          <select id="wh-field-min-tier" class="select" required></select>
        </label>
      </div>
    </form>
    <div class="modal-foot">
      <button id="wh-modal-delete" type="button" class="btn btn-danger hidden">删除</button>
      <div class="modal-foot-spacer"></div>
      <button type="button" class="btn" data-modal-close="wh-modal">取消</button>
      <button id="wh-modal-save" type="submit" form="wh-modal-form" class="btn btn-primary">保存</button>
    </div>
  </div>
</div>

<div id="wh-delete-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="wh-delete-title">
  <div class="modal-mask" data-modal-close="wh-delete-modal"></div>
  <div class="modal-card confirm-modal-card">
    <div class="modal-head">
      <h3 id="wh-delete-title" class="modal-title">删除物品</h3>
      <button type="button" class="btn btn-icon modal-close-btn" data-modal-close="wh-delete-modal" aria-label="关闭">✕</button>
    </div>
    <div id="wh-delete-alert" class="alert hidden modal-alert" role="status" aria-live="polite">
      <span class="alert-message"></span>
    </div>
    <div class="modal-body confirm-modal-body">
      <p class="confirm-modal-text">
        确定清空格子「<span id="wh-delete-slot" class="confirm-modal-highlight"></span>」吗？此操作不可恢复。
      </p>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn" data-modal-close="wh-delete-modal">取消</button>
      <button id="wh-delete-confirm" type="button" class="btn btn-danger">确认删除</button>
    </div>
  </div>
</div>
