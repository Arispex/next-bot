<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [data-theme="dark"] body { background: linear-gradient(160deg, #0f0a14 0%, #15101e 50%, #0a050d 100%); }
    [data-theme="dark"] .page-header { background: linear-gradient(90deg, rgba(168,85,247,0.0) 0%, rgba(236,72,153,0.10) 50%, rgba(168,85,247,0.0) 100%); border-color: rgba(236,72,153,0.20); }
    [data-theme="dark"] .header-title { color: #f0abfc; text-shadow: 0 2px 20px rgba(236,72,153,0.30); }
    [data-theme="dark"] .header-subtitle { color: #cbd5e1; }
    [data-theme="dark"] .header-rule { background: linear-gradient(90deg, #a855f7, #ec4899, transparent); }
    [data-theme="dark"] .header-time { color: #64748b; }
    [data-theme="dark"] .pool-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(236,72,153,0.18); }
    [data-theme="dark"] .pool-name { color: #f5d0fe; }
    [data-theme="dark"] .pool-desc { color: #cbd5e1; }
    [data-theme="dark"] .index-pill { background: rgba(148,163,184,0.18); color: #cbd5e1; }
    [data-theme="dark"] .id-pill { background: rgba(236,72,153,0.18); color: #fbcfe8; border: 1px solid rgba(236,72,153,0.40); }
    [data-theme="dark"] .count-pill { background: rgba(59,130,246,0.18); color: #bfdbfe; border: 1px solid rgba(59,130,246,0.35); }
    [data-theme="dark"] .cost-pill { background: rgba(234,179,8,0.18); color: #fde68a; border: 1px solid rgba(234,179,8,0.40); }
    [data-theme="dark"] .pagination { color: #cbd5e1; }
    [data-theme="dark"] .hint-line { color: #94a3b8; }
    [data-theme="dark"] .empty-state { color: #64748b; }
    [data-theme="dark"] .page-footer { color: #1f2937; }

    [data-theme="light"] body { background: linear-gradient(135deg, #fdf4ff 0%, #fef3f8 40%, #fdf4ff 100%); }
    [data-theme="light"] .page-header { background: linear-gradient(90deg, rgba(168,85,247,0.0) 0%, rgba(236,72,153,0.08) 50%, rgba(168,85,247,0.0) 100%); border-color: rgba(236,72,153,0.25); }
    [data-theme="light"] .header-title { color: #a21caf; }
    [data-theme="light"] .header-subtitle { color: #86198f; }
    [data-theme="light"] .header-rule { background: linear-gradient(90deg, #a855f7, #ec4899, transparent); }
    [data-theme="light"] .header-time { color: #a8a29e; }
    [data-theme="light"] .pool-card { background: #ffffff; border: 1px solid #fae8ff; box-shadow: 0 2px 12px rgba(236,72,153,0.06); }
    [data-theme="light"] .pool-name { color: #1e293b; }
    [data-theme="light"] .pool-desc { color: #475569; }
    [data-theme="light"] .index-pill { background: #f1f5f9; color: #475569; }
    [data-theme="light"] .id-pill { background: #fdf4ff; color: #a21caf; border: 1px solid #f5d0fe; }
    [data-theme="light"] .count-pill { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
    [data-theme="light"] .cost-pill { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
    [data-theme="light"] .pagination { color: #475569; }
    [data-theme="light"] .hint-line { color: #78716c; }
    [data-theme="light"] .empty-state { color: #94a3b8; }
    [data-theme="light"] .page-footer { color: #e7e5e4; }
  </style>
</head>
<body class="px-8 py-6">
  <div class="page-header mx-auto max-w-[820px] rounded-2xl px-8 py-4 mb-4 border">
    <div class="flex items-end justify-between gap-6">
      <div>
        <div class="header-rule h-1 w-16 rounded-full mb-3"></div>
        <h1 class="header-title text-4xl font-black tracking-tight" style="letter-spacing:-0.02em;">奖池列表</h1>
        <div id="pool-summary" class="header-subtitle text-sm font-medium mt-1"></div>
      </div>
      <div class="text-right"><div class="header-time text-xs" id="generated-at"></div></div>
    </div>
  </div>

  <div class="mx-auto max-w-[820px]" id="pool-list" style="display:flex; flex-direction:column; gap:10px;"></div>
  <div id="empty-state" class="mx-auto max-w-[820px] empty-state" style="display:none; padding:48px 0; text-align:center; font-size:13px;">暂无可用奖池</div>

  <div class="mx-auto max-w-[820px] mt-4 flex flex-col items-center gap-1">
    <div id="hint-line" class="hint-line text-xs" style="display:none;"></div>
    <div id="pool-pagination" class="pagination text-sm font-semibold" style="display:none;"></div>
    <div class="page-footer text-xs font-medium tracking-widest mt-1">Powered by NextBot</div>
  </div>

  <script id="lottery-list-data" type="application/json">__LOTTERY_LIST_DATA_JSON__</script>
  <script>
    (function () {
      const data = JSON.parse(document.getElementById("lottery-list-data").textContent);
      const entries = Array.isArray(data.entries) ? data.entries : [];
      document.documentElement.setAttribute("data-theme", String(data.theme || "light"));

      const total = Number(data.total || entries.length || 0);
      const totalPages = Number(data.total_pages || 1);
      const page = Number(data.page || 1);

      document.getElementById("pool-summary").textContent = "共 " + total + " 个上架奖池";
      document.getElementById("generated-at").textContent = data.generated_at || "";

      const list = document.getElementById("pool-list");
      const empty = document.getElementById("empty-state");
      if (entries.length === 0) {
        empty.style.display = "block";
      } else {
        entries.forEach(function (e) { list.appendChild(renderCard(e)); });
      }

      const hintLine = document.getElementById("hint-line");
      hintLine.textContent = "查看奖池：「查看奖池 <奖池 ID/奖池名称> [页数]」 / 抽奖：「抽奖 <奖池 ID/奖池名称> [次数]」";
      hintLine.style.display = "block";

      const pagination = document.getElementById("pool-pagination");
      if (totalPages > 1) {
        pagination.textContent = "第 " + page + " 页 / 共 " + totalPages + " 页";
        pagination.style.display = "block";
      }

      function renderCard(entry) {
        const card = document.createElement("div");
        card.className = "pool-card rounded-xl";
        card.style.cssText = "padding:12px 16px; display:flex; flex-direction:column; gap:6px;";

        const head = document.createElement("div");
        head.style.cssText = "display:flex; align-items:center; gap:10px; flex-wrap:wrap;";

        const idx = document.createElement("span");
        idx.className = "index-pill";
        idx.style.cssText = "font-size:12px; font-weight:700; padding:2px 8px; border-radius:6px;";
        idx.textContent = "#" + entry.display_index;
        head.appendChild(idx);

        const name = document.createElement("span");
        name.className = "pool-name";
        name.style.cssText = "font-size:16px; font-weight:800;";
        name.textContent = entry.name || "未命名奖池";
        head.appendChild(name);

        const idBadge = document.createElement("span");
        idBadge.className = "id-pill";
        idBadge.style.cssText = "font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px;";
        idBadge.textContent = "ID " + entry.pool_id;
        head.appendChild(idBadge);

        const countBadge = document.createElement("span");
        countBadge.className = "count-pill";
        countBadge.style.cssText = "font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px;";
        countBadge.textContent = entry.prize_count + " 件奖品";
        head.appendChild(countBadge);

        const costBadge = document.createElement("span");
        costBadge.className = "cost-pill";
        costBadge.style.cssText = "font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px;";
        costBadge.textContent = "💰 " + entry.cost_per_draw + " / 次";
        head.appendChild(costBadge);
        card.appendChild(head);

        if (entry.description) {
          const desc = document.createElement("div");
          desc.className = "pool-desc";
          desc.style.cssText = "font-size:13px; line-height:1.5;";
          desc.textContent = entry.description;
          card.appendChild(desc);
        }
        return card;
      }
    })();
  </script>
</body>
</html>
