<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextBot - 菜单</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(160deg, #f0f4ff 0%, #f8fafc 40%, #eef2f7 100%);
    }

    .card {
      background: white;
      border: 1px solid #e8ecf4;
      box-shadow: 0 2px 8px rgba(30, 50, 120, 0.06), 0 0 0 0 transparent;
      transition: box-shadow 0.15s;
    }

    .usage-block {
      background: #f6f8ff;
      border: 1px solid #e0e7ff;
      font-family: ui-monospace, 'SFMono-Regular', Menlo, monospace;
    }

    .perm-badge {
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #4338ca;
    }

    .perm-badge-none {
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
    }

    .header-rule {
      background: linear-gradient(90deg, #6366f1 0%, #818cf8 50%, transparent 100%);
    }
  </style>
</head>
<body class="min-h-screen px-8 py-8 text-slate-900">

  <!-- Background blobs -->
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="absolute left-[5%] top-8 h-64 w-64 rounded-full bg-indigo-200/25 blur-3xl"></div>
    <div class="absolute right-[6%] top-16 h-80 w-80 rounded-full bg-sky-100/40 blur-3xl"></div>
    <div class="absolute bottom-10 left-1/2 h-72 w-[40rem] -translate-x-1/2 rounded-full bg-slate-200/25 blur-3xl"></div>
  </div>

  <main class="relative mx-auto max-w-[1880px]">

    <!-- Header -->
    <header class="mb-8">
      <div class="h-1 w-24 rounded-full header-rule mb-5"></div>
      <h1 id="menu-title" class="text-5xl font-bold tracking-tight text-slate-900" style="letter-spacing: -0.03em;"></h1>
      <p class="mt-2 text-sm text-slate-400" id="footer-generated-at"></p>
    </header>

    <!-- Empty state -->
    <div id="empty-state" class="hidden rounded-3xl border border-dashed border-slate-200 bg-white/60 py-20 text-center">
      <div class="text-lg font-semibold text-slate-400">暂无命令</div>
      <div class="mt-2 text-sm text-slate-300">当前分类下没有可显示的命令</div>
    </div>

    <!-- Card grid -->
    <div id="card-grid" class="grid gap-4" style="grid-template-columns: repeat(3, 1fr);"></div>

    <footer class="mt-8 text-right text-xs tracking-widest text-slate-300">
      Powered by NextBot
    </footer>
  </main>

  <script id="menu-data" type="application/json">__MENU_DATA_JSON__</script>
  <script>
    const data = JSON.parse(document.getElementById("menu-data").textContent);
    const commands = Array.isArray(data.commands) ? data.commands : [];

    document.getElementById("menu-title").textContent = data.title || "菜单";
    document.getElementById("footer-generated-at").textContent = data.generated_at || "";

    const grid = document.getElementById("card-grid");
    const emptyState = document.getElementById("empty-state");

    if (!commands.length) {
      emptyState.classList.remove("hidden");
      grid.classList.add("hidden");
    }

    commands.forEach((item, index) => {
      const name = String(item?.display_name || "").trim() || "-";
      const desc = String(item?.description || "").trim() || "暂无介绍";
      const usage = String(item?.usage || "").trim();
      const permission = String(item?.permission || "").trim();

      const card = document.createElement("article");
      card.className = "card rounded-2xl p-5 flex flex-col gap-3";

      // Header row: index badge + name
      const cardHead = document.createElement("div");
      cardHead.className = "flex items-start gap-3";

      const indexBadge = document.createElement("div");
      indexBadge.className = "shrink-0 mt-0.5 h-7 w-7 rounded-lg bg-indigo-50 border border-indigo-100 flex items-center justify-center text-[11px] font-bold text-indigo-400";
      indexBadge.textContent = String(index + 1).padStart(2, "0");

      const nameEl = document.createElement("h2");
      nameEl.className = "text-xl font-bold text-slate-900 leading-tight";
      nameEl.style.letterSpacing = "-0.02em";
      nameEl.textContent = name;

      cardHead.appendChild(indexBadge);
      cardHead.appendChild(nameEl);

      // Description
      const descEl = document.createElement("p");
      descEl.className = "text-sm leading-relaxed text-slate-500";
      descEl.textContent = desc;

      // Usage
      const usageEl = document.createElement("div");
      usageEl.className = "usage-block rounded-lg px-3 py-2 text-[13px] text-slate-600 leading-relaxed break-all";
      usageEl.textContent = usage || "—";

      // Footer: permission badge
      const cardFoot = document.createElement("div");
      cardFoot.className = "mt-auto pt-1 flex items-center gap-2";

      const permLabel = document.createElement("span");
      permLabel.className = "text-[10px] font-semibold uppercase tracking-widest text-slate-300";
      permLabel.textContent = "权限";

      const permBadge = document.createElement("span");
      permBadge.className = "rounded-full px-2.5 py-0.5 text-[11px] font-medium break-all "
        + (permission ? "perm-badge" : "perm-badge-none");
      permBadge.textContent = permission || "无需额外权限";

      cardFoot.appendChild(permLabel);
      cardFoot.appendChild(permBadge);

      card.appendChild(cardHead);
      card.appendChild(descEl);
      card.appendChild(usageEl);
      card.appendChild(cardFoot);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
